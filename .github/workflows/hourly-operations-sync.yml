# Hourly Metabase → Supabase orders sync + materialized view refresh.
#
# ── Required GitHub secrets (Settings → Secrets and variables → Actions) ─────
#   NEXT_PUBLIC_SUPABASE_URL      — Full URL with https:// e.g. https://xxxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY     — Service role key (not anon key)
#
# ── Optional secrets ─────────────────────────────────────────────────────────
#   METABASE_ORDERS_API_URL       — Override Metabase orders JSON feed.
#                                   IMPORTANT: Do not create this secret with an
#                                   empty value — delete it entirely to use the
#                                   built-in default Metabase URL.
#   DATABASE_URL                  — Supabase Postgres URI (Session pooler). Faster sync.
#   VERCEL_PRODUCTION_URL         — e.g. https://360-portal-beige.vercel.app
#   CRON_SECRET                   — Same value as Vercel CRON_SECRET
#
# Schedule: every hour at :00 UTC.

name: Hourly Operations Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-operations-sync
  cancel-in-progress: false

jobs:
  sync-orders-and-refresh:
    name: Sync orders & refresh materialized views
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::Missing GitHub secret NEXT_PUBLIC_SUPABASE_URL"
            exit 1
          fi
          case "${NEXT_PUBLIC_SUPABASE_URL}" in
            http://*|https://*) ;;
            *)
              echo "::error::NEXT_PUBLIC_SUPABASE_URL must include https:// (e.g. https://xxxx.supabase.co)"
              exit 1
              ;;
          esac
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          echo "Required secrets are set."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-sync.txt

      - name: Install sync dependencies
        run: pip install -r scripts/requirements-sync.txt

      - name: Sync Metabase orders to Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          METABASE_ORDERS_API_URL: ${{ secrets.METABASE_ORDERS_API_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -n "${DATABASE_URL:-}" ]; then
            echo "Using Postgres upsert (DATABASE_URL set)"
            python scripts/sync_orders.py --batch-size 10000 --workers 4
          else
            echo "Using REST upsert (no DATABASE_URL)"
            python scripts/sync_orders.py --rest --batch-size 1000 --workers 2
          fi

      - name: Refresh order materialized views
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          case "${SUPABASE_URL}" in
            http://*|https://*) BASE="${SUPABASE_URL%/}" ;;
            *) BASE="https://${SUPABASE_URL#/}" ;;
          esac
          curl -sf -X POST \
            "${BASE}/rest/v1/rpc/refresh_ops_orders_summaries_simple" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{}"
          echo "Order materialized views refreshed."

      - name: Full operations sync via Vercel cron (optional)
        continue-on-error: true
        env:
          VERCEL_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Skipping Vercel cron — set VERCEL_PRODUCTION_URL and CRON_SECRET to enable"
            exit 0
          fi
          BASE="${VERCEL_URL%/}"
          echo "Calling ${BASE}/api/cron/operations-sync"
          curl -sf -X GET \
            "${BASE}/api/cron/operations-sync" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 1800
          echo "Full operations sync completed."
